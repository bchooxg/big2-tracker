<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big 2 Game Tracker</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --green:        #16a34a;
      --green-dark:   #15803d;
      --red:          #dc2626;
      --accent:       #7c3aed;
      --accent-dark:  #6d28d9;
      --muted:        #6b7280;
      --neutral:      #1f2937;
      --surface:      #f9fafb;
      --surface2:     #ffffff;
      --surface-hover:#f3f4f6;
      --border:       #e5e7eb;
      --bg:           #f0f2f5;
      --radius-sm:    6px;
      --radius:       10px;
      --radius-lg:    16px;
      --shadow-sm:    0 1px 2px rgba(0,0,0,.07);
      --shadow-md:    0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);
      --shadow-lg:    0 20px 48px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.1);
    }

    /* ── Reset & base ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{width:100%;overflow:hidden;height:100%}
    body{
      font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg);
      color:var(--neutral);
      min-height:100vh;
      line-height:1.5;
      overflow-x:hidden;
      overflow-y:auto;
      width:100%;
      height:100%;
    }
    /* iOS Safari viewport fix — overflow:hidden on html/body is unreliable */
    #app-root{
      width:100%;
      max-width:100vw;
      overflow-x:hidden;
    }
    input,select,textarea,button{font-family:inherit}
    /* Prevent iOS auto-zoom on input focus */
    input,select{font-size:1rem}

    /* ── Header ── */
    header{
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
      color:#fff;
      padding:1.5rem 1.5rem 1.25rem;
      text-align:center;
      box-shadow:0 2px 8px rgba(124,58,237,.3);
    }
    header h1{
      font-size:1.6rem;
      font-weight:800;
      letter-spacing:-.02em;
      text-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    header p{font-size:.85rem;opacity:.8;margin-top:.25rem}

    /* ── Main layout ── */
    main{
      max-width:1100px;
      margin:0 auto;
      padding:1.25rem;
      display:grid;
      gap:1.25rem;
    }

    /* ── Cards ── */
    .card{
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-md);
      padding:1.5rem;
    }
    .card h2{
      font-size:.9rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:var(--accent);
      margin-bottom:1rem;
      padding-bottom:.6rem;
      border-bottom:2px solid var(--border);
    }

    /* ── Buttons ── */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.35rem;
      padding:.5rem .9rem;
      min-height:38px;
      border:none;
      border-radius:var(--radius-sm);
      font-size:.875rem;
      font-weight:600;
      cursor:pointer;
      transition:background-color .15s,box-shadow .15s,transform .1s,opacity .15s;
      line-height:1;
      white-space:nowrap;
    }
    .btn:active{transform:scale(0.97)}
    .btn:focus-visible{
      outline:2px solid var(--accent);
      outline-offset:2px;
    }
    .btn-primary{
      background:var(--accent);
      color:#fff;
      box-shadow:0 1px 3px rgba(124,58,237,.35);
    }
    .btn-primary:hover{background:var(--accent-dark);box-shadow:0 2px 6px rgba(124,58,237,.4)}
    .btn-danger{
      background:var(--red);
      color:#fff;
      box-shadow:0 1px 3px rgba(220,38,38,.25);
    }
    .btn-danger:hover{background:#b91c1c}
    .btn-ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
    }
    .btn-ghost:hover{background:var(--surface-hover);color:var(--neutral)}
    .btn-accent{
      background:var(--accent);
      color:#fff;
      box-shadow:0 1px 3px rgba(124,58,237,.35);
    }
    .btn-accent:hover{background:var(--accent-dark)}
    .btn-sm{padding:.3rem .6rem;font-size:.78rem;min-height:30px}

    .error-msg{color:var(--red);font-size:.8rem;margin-top:.4rem;min-height:1.1em;font-weight:500}

    /* ── Player management ── */
    .player-list{display:flex;flex-direction:column;gap:.5rem}
    .player-row{display:flex;align-items:center;gap:.5rem}
    .player-row input[type="text"]{
      flex:1;
      min-width:0;
      padding:.45rem .7rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:1rem;
      background:var(--surface);
      transition:border-color .15s,box-shadow .15s;
    }
    .player-row input[type="text"]:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }

    /* ── Round entry ── */
    .entry-controls{
      display:flex;
      align-items:center;
      gap:.75rem;
      flex-wrap:wrap;
      margin-bottom:1rem;
    }
    .entry-controls label{font-size:.875rem;font-weight:600;color:var(--muted)}
    .entry-controls input[type="number"]{
      width:90px;
      padding:.45rem .6rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:1rem;
      background:var(--surface);
      transition:border-color .15s,box-shadow .15s;
    }
    .entry-controls input[type="number"]:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }

    /* Mobile-first player grid */
    .player-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:.65rem;
      margin-bottom:1rem;
    }
    @media(min-width:480px){
      .player-grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(min-width:700px){
      .player-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
    }

    .player-entry{
      padding:.75rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius);
      background:var(--surface);
      display:flex;
      flex-direction:column;
      gap:.4rem;
      transition:border-color .15s;
    }
    .player-entry:focus-within{border-color:var(--accent)}
    .player-entry>label{
      font-size:.875rem;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:.4rem;
    }
    .player-entry input[type="number"]{
      width:100%;
      padding:.4rem .55rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:1rem;
      background:var(--surface2);
      transition:border-color .15s,box-shadow .15s;
    }
    .player-entry input[type="number"]:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }

    .entry-actions{display:flex;gap:.65rem;flex-wrap:wrap}
    @media(max-width:479px){
      .entry-actions .btn{width:100%}
      .entry-controls{gap:.5rem}
    }

    /* ── Results table ── */
    .table-wrapper{display:block;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius-sm);border:1px solid var(--border)}
    table{min-width:100%;border-collapse:collapse;font-size:.875rem;white-space:nowrap}
    th,td{
      padding:.6rem .85rem;
      border-bottom:1px solid var(--border);
      border-right:1px solid var(--border);
      text-align:center;
      vertical-align:middle;
    }
    th:last-child,td:last-child{border-right:none}
    th{
      background:var(--surface);
      font-weight:700;
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:var(--muted);
      border-bottom:2px solid var(--border);
    }
    tbody tr:nth-child(even):not(.totals-row){background:var(--surface)}
    tbody tr:hover:not(.totals-row){background:var(--surface-hover)}

    /* Sticky first column */
    th:first-child{
      position:sticky;left:0;z-index:2;
      background:var(--surface);
      box-shadow:2px 0 4px rgba(0,0,0,.06);
    }
    td.round-label{
      position:sticky;left:0;z-index:1;
      background:inherit;
      box-shadow:2px 0 4px rgba(0,0,0,.06);
      text-align:left;
      min-width:120px;
    }
    tbody tr:nth-child(even):not(.totals-row) td.round-label{background:var(--surface)}
    tbody tr:hover:not(.totals-row) td.round-label{background:var(--surface-hover)}

    /* Player columns min-width */
    th:not(:first-child):not(:last-child):not(:nth-last-child(2)){min-width:90px}

    .main-label{font-weight:700;font-size:.9rem}
    .sub-label{font-size:.72rem;color:var(--accent);font-weight:500}
    .cards-line{font-size:.75rem;color:var(--muted)}
    .money-line{font-weight:700}
    .money-pos{color:var(--green)}
    .money-neg{color:var(--red)}
    .money-zero{color:var(--muted)}
    .inactive-cell{color:var(--border)}
    .balance-ok{color:var(--muted);font-size:.8rem}
    .balance-err{color:var(--red);font-size:.8rem;font-weight:600}
    .winner-cell{color:var(--accent);font-weight:700}
    .row-actions{display:flex;gap:.35rem;justify-content:center}

    /* ── Summary ── */
    .summary-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:1rem;
      margin-bottom:1.25rem;
    }
    @media(min-width:480px){
      .summary-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
    }
    .stat-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:1.1rem 1rem;
      text-align:center;
      box-shadow:var(--shadow-sm);
    }
    .stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;font-weight:600}
    .stat-value{font-size:1.25rem;font-weight:800}
    .stat-value.pos{color:var(--green)}
    .stat-value.neg{color:var(--red)}
    .stat-value small{font-size:.85rem;font-weight:600;display:block;margin-top:.1rem}

    /* ── Totals row ── */
    tr.totals-row td{
      background:var(--surface);
      font-weight:700;
      border-top:2.5px solid var(--accent);
      position:sticky;
    }
    tr.totals-row td:first-child{
      position:sticky;left:0;z-index:1;
      background:var(--surface);
      box-shadow:2px 0 4px rgba(0,0,0,.06);
    }

    /* ── Modals ── */
    dialog{
      border:none;
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-lg);
      padding:0;
      max-width:480px;
      width:90vw;
      max-height:90vh;
      overflow-y:auto;
      /* Centre in viewport regardless of scroll */
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      margin:0;
    }
    dialog::backdrop{
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(2px);
    }
    dialog h3{
      font-size:1rem;
      font-weight:700;
      padding:1.25rem 1.5rem 1rem;
      border-bottom:2px solid var(--border);
      color:var(--neutral);
      border-left:4px solid var(--accent);
    }
    .modal-body{padding:1.25rem 1.5rem;margin:0}
    .modal-actions{
      display:flex;
      gap:.5rem;
      justify-content:flex-end;
      padding:1rem 1.5rem;
      border-top:1px solid var(--border);
      background:var(--surface);
    }
    @media(max-width:400px){
      .modal-actions{flex-direction:column-reverse}
      .modal-actions .btn{width:100%}
    }
    .modal-field{margin-bottom:.85rem}
    .modal-field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.35rem;color:var(--muted)}
    .modal-field select,
    .modal-field input[type="number"]{
      width:100%;
      padding:.5rem .7rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:1rem;
      font-family:inherit;
      background:var(--surface);
      transition:border-color .15s,box-shadow .15s;
    }
    .modal-field select:focus,
    .modal-field input[type="number"]:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }
    .edit-player-grid{display:flex;flex-direction:column;gap:.5rem}
    .edit-player-row{
      display:flex;
      align-items:center;
      gap:.5rem;
      padding:.5rem .65rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      background:var(--surface);
      transition:border-color .15s;
    }
    .edit-player-row:focus-within{border-color:var(--accent)}
    .edit-player-row>label{flex:1;font-size:.875rem;font-weight:500;display:flex;align-items:center;gap:.35rem}
    .edit-player-row input[type="number"]{
      width:72px;
      padding:.3rem .4rem;
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:1rem;
    }
    .edit-player-row input[type="number"]:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }
  </style>
</head>
<body>
<div id="app-root">

<header>
  <h1>Big 2 Game Tracker</h1>
  <p>Track your Big Two card game scores</p>
</header>

<main>

  <!-- ── Players ── -->
  <div class="card">
    <h2>Players</h2>
    <div class="player-list" id="player-list"></div>
    <div id="player-error" class="error-msg"></div>
    <div style="margin-top:.75rem">
      <button class="btn btn-ghost" onclick="addPlayer()">+ Add Player</button>
    </div>
  </div>

  <!-- ── Round Entry ── -->
  <div class="card">
    <h2>Round Entry</h2>
    <div class="entry-controls">
      <label for="price-input">Price per Card ($)</label>
      <input type="number" id="price-input" min="0.1" step="0.1" value="1" inputmode="decimal">
    </div>
    <div class="player-grid" id="entry-player-grid"></div>
    <div id="entry-error" class="error-msg"></div>
    <div class="entry-actions">
      <button class="btn btn-primary" onclick="addRound()">Add Round</button>
      <button class="btn btn-accent"  onclick="openSpecialCombo()">Add Special Combo</button>
    </div>
  </div>

  <!-- ── Game Results ── -->
  <div class="card">
    <h2>Game Results</h2>
    <div class="table-wrapper">
      <table id="results-table" style="display:none">
        <thead id="results-thead"></thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
    <div id="no-rounds" style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.9rem">
      No rounds yet — add a round above!
    </div>
  </div>

  <!-- ── Summary ── -->
  <div class="card">
    <h2>Summary</h2>
    <div class="summary-grid" id="summary-grid"></div>
    <button class="btn btn-ghost btn-sm" onclick="resetGame()">Reset Game</button>
  </div>

</main>
</div><!-- /#app-root -->

<!-- ── Special Combo Modal ── -->
<dialog id="special-modal">
  <h3>Add Special Combo</h3>
  <div class="modal-body">
    <div class="modal-field">
      <label for="special-winner-select">Select Winner</label>
      <select id="special-winner-select"></select>
    </div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="document.getElementById('special-modal').close()">Cancel</button>
    <button class="btn btn-accent" onclick="confirmSpecialCombo()">Confirm</button>
  </div>
</dialog>

<!-- ── Edit Round Modal ── -->
<dialog id="edit-modal">
  <h3>Edit Round</h3>
  <div class="modal-body">
    <div class="modal-field">
      <label for="edit-price-input">Price per Card ($)</label>
      <input type="number" id="edit-price-input" min="0.1" step="0.1" value="1" inputmode="decimal">
    </div>
    <div class="edit-player-grid" id="edit-player-grid"></div>
    <div id="edit-error" class="error-msg" style="margin-top:.5rem"></div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveEdit()">Save</button>
  </div>
</dialog>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════

let _nextPlayerId = 1;
let _nextRoundId  = 1;

const state = {
  players: [],   // [{id, name}]
  rounds:  []    // [{id, type, pricePerCard, participants, winnerId?}]
};

// Bootstrap 4 default players
['Player 1','Player 2','Player 3','Player 4'].forEach(n =>
  state.players.push({ id: _nextPlayerId++, name: n })
);

// ════════════════════════════════════════════════════════════
// SCORING ENGINE
// ════════════════════════════════════════════════════════════

function getMultiplier(cards) {
  if (cards === 13) return 3;
  if (cards >= 10)  return 2;
  return 1;
}

function r2(v) { return Math.round(v * 100) / 100; }

/**
 * Compute zero-sum pairwise scores.
 * participants: [{playerId, cards}]
 * Returns [{playerId, cards, score}]
 */
function computeRoundScores(participants, pricePerCard) {
  const raw = {};
  participants.forEach(p => { raw[p.playerId] = 0; });

  for (let i = 0; i < participants.length; i++) {
    for (let j = i + 1; j < participants.length; j++) {
      const a = participants[i], b = participants[j];
      if (a.cards === b.cards) continue;
      const winner = a.cards < b.cards ? a : b;
      const loser  = a.cards < b.cards ? b : a;
      const transfer = r2((loser.cards - winner.cards) * pricePerCard * getMultiplier(loser.cards));
      raw[winner.playerId] += transfer;
      raw[loser.playerId]  -= transfer;
    }
  }

  return participants.map(p => ({
    playerId: p.playerId,
    cards:    p.cards,
    score:    r2(raw[p.playerId])
  }));
}

/**
 * Compute special combo scores.
 * activePlayerIds: number[]  winnerId: number
 */
function computeSpecialScores(activePlayerIds, winnerId) {
  const others = activePlayerIds.filter(id => id !== winnerId);
  const winnerScore = r2(3 * others.length);
  return activePlayerIds.map(id => ({
    playerId: id,
    score: id === winnerId ? winnerScore : -3
  }));
}

// ════════════════════════════════════════════════════════════
// INLINE TESTS  (open DevTools → Console to see results)
// ════════════════════════════════════════════════════════════

(function runTests() {
  function assert(cond, msg) {
    if (cond) console.log('%c[PASS] ' + msg, 'color:green');
    else      console.error('[FAIL] ' + msg);
  }

  // Rule B: payment = difference in card counts × price × multiplier(loser)
  // 2-player: P1=3, P2=7 → P2 loses, diff=4, transfer=4×1×1=4
  const r2p = computeRoundScores([{playerId:1,cards:3},{playerId:2,cards:7}], 1);
  assert(Math.abs(r2p.reduce((s,p)=>s+p.score,0)) < 0.01,  '2-player sums to zero');
  assert(r2p.find(p=>p.playerId===1).score ===  4,          '2-player winner gets +4 (diff=4)');
  assert(r2p.find(p=>p.playerId===2).score === -4,          '2-player loser pays -4 (diff=4)');

  // 3-player sums to zero
  const r3p = computeRoundScores([{playerId:1,cards:2},{playerId:2,cards:5},{playerId:3,cards:9}],1);
  assert(Math.abs(r3p.reduce((s,p)=>s+p.score,0)) < 0.01,  '3-player sums to zero');

  // Multipliers
  assert(getMultiplier(9)  === 1, 'multiplier 1x at 9 cards');
  assert(getMultiplier(10) === 2, 'multiplier 2x at 10 cards');
  assert(getMultiplier(12) === 2, 'multiplier 2x at 12 cards');
  assert(getMultiplier(13) === 3, 'multiplier 3x at 13 cards');

  // 13-card payout: P1=2, P2=13 → diff=11, multiplier=3×, transfer=11×1×3=33
  const r13 = computeRoundScores([{playerId:1,cards:2},{playerId:2,cards:13}], 1);
  assert(r13.find(p=>p.playerId===2).score === -33,           '13-card payout = -33 (diff=11, 3x)');
  assert(Math.abs(r13.reduce((s,p)=>s+p.score,0)) < 0.01,    '13-card round sums to zero');

  // 10-card payout: P1=3, P2=10 → diff=7, multiplier=2×, transfer=7×1×2=14
  const r10 = computeRoundScores([{playerId:1,cards:3},{playerId:2,cards:10}], 1);
  assert(r10.find(p=>p.playerId===2).score === -14,           '10-card payout = -14 (diff=7, 2x)');

  // Special combo 3 players
  const sc = computeSpecialScores([1,2,3], 1);
  assert(sc.find(p=>p.playerId===1).score ===  6,             'special: winner gets +6');
  assert(sc.find(p=>p.playerId===2).score === -3,             'special: loser pays -3');
  assert(Math.abs(sc.reduce((s,p)=>s+p.score,0)) < 0.01,     'special combo sums to zero');
})();

// ════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtMoney(v) {
  if (v === 0) return '$0.00';
  const abs = Math.abs(v).toFixed(2);
  return v > 0 ? `+$${abs}` : `-$${abs}`;
}

function moneyClass(v) {
  if (v > 0) return 'money-pos';
  if (v < 0) return 'money-neg';
  return 'money-zero';
}

// ════════════════════════════════════════════════════════════
// PLAYER MANAGEMENT
// ════════════════════════════════════════════════════════════

function addPlayer() {
  const name = `Player ${state.players.length + 1}`;
  state.players.push({ id: _nextPlayerId++, name });
  setPlayerError('');
  render();
}

function removePlayer(id) {
  if (state.players.length <= 2) {
    setPlayerError('At least 2 players are required.');
    return;
  }
  const inRound = state.rounds.some(r => r.participants.some(p => p.playerId === id));
  if (inRound) {
    setPlayerError('Cannot remove a player who has participated in a round.');
    return;
  }
  state.players = state.players.filter(p => p.id !== id);
  setPlayerError('');
  render();
}

function renamePlayer(id, newName) {
  const player = state.players.find(p => p.id === id);
  if (player && newName.trim()) player.name = newName.trim();
  render();
}

function setPlayerError(msg) {
  document.getElementById('player-error').textContent = msg;
}

function renderPlayerManagement() {
  document.getElementById('player-list').innerHTML = state.players.map(p => `
    <div class="player-row">
      <input type="text" value="${escHtml(p.name)}"
        onblur="renamePlayer(${p.id}, this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"
        aria-label="Player name">
      <button class="btn btn-danger btn-sm" onclick="removePlayer(${p.id})">Remove</button>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════════
// ROUND ENTRY
// ════════════════════════════════════════════════════════════

function renderRoundEntry() {
  document.getElementById('entry-player-grid').innerHTML = state.players.map(p => `
    <div class="player-entry">
      <label>
        <input type="checkbox" id="cb-${p.id}" checked>
        ${escHtml(p.name)}
      </label>
      <input type="number" id="cards-${p.id}" value="" min="0" max="13" step="1"
             placeholder="0" inputmode="numeric" pattern="[0-9]*">
    </div>
  `).join('');
}

function getActiveFromEntry() {
  return state.players
    .filter(p => document.getElementById(`cb-${p.id}`)?.checked)
    .map(p => ({
      playerId: p.id,
      cards: parseInt(document.getElementById(`cards-${p.id}`).value, 10) || 0
    }));
}

function setEntryError(msg) {
  document.getElementById('entry-error').textContent = msg;
}

function addRound() {
  const active = getActiveFromEntry();
  if (active.length < 2 || active.length > 4) {
    setEntryError('Select between 2 and 4 active players per round.');
    return;
  }
  for (const p of active) {
    if (!Number.isInteger(p.cards) || p.cards < 0 || p.cards > 13) {
      setEntryError('Card counts must be whole numbers between 0 and 13.');
      return;
    }
  }
  setEntryError('');

  const price = parseFloat(document.getElementById('price-input').value) || 1;
  const participants = computeRoundScores(active, price);

  state.rounds.push({ id: _nextRoundId++, type: 'normal', pricePerCard: price, participants });

  // Reset card inputs
  state.players.forEach(p => {
    const el = document.getElementById(`cards-${p.id}`);
    if (el) el.value = '';
  });

  render();
}

// ════════════════════════════════════════════════════════════
// SPECIAL COMBO
// ════════════════════════════════════════════════════════════

let _specialActivePlayers = [];

function openSpecialCombo() {
  const active = getActiveFromEntry();
  if (active.length < 2 || active.length > 4) {
    setEntryError('Select between 2 and 4 active players for a special combo.');
    return;
  }
  setEntryError('');
  _specialActivePlayers = active.map(a => a.playerId);

  const sel = document.getElementById('special-winner-select');
  sel.innerHTML = _specialActivePlayers.map(id => {
    const player = state.players.find(p => p.id === id);
    return `<option value="${id}">${escHtml(player ? player.name : String(id))}</option>`;
  }).join('');

  document.getElementById('special-modal').showModal();
}

function confirmSpecialCombo() {
  const winnerId = parseInt(document.getElementById('special-winner-select').value, 10);
  const participants = computeSpecialScores(_specialActivePlayers, winnerId);
  state.rounds.push({ id: _nextRoundId++, type: 'special', pricePerCard: null, participants, winnerId });
  document.getElementById('special-modal').close();
  render();
}

// ════════════════════════════════════════════════════════════
// GAME RESULTS TABLE
// ════════════════════════════════════════════════════════════

function renderResultsTable() {
  const table   = document.getElementById('results-table');
  const noRounds= document.getElementById('no-rounds');
  const thead   = document.getElementById('results-thead');
  const tbody   = document.getElementById('results-tbody');

  if (state.rounds.length === 0) {
    table.style.display = 'none';
    noRounds.style.display = '';
    return;
  }
  table.style.display = '';
  noRounds.style.display = 'none';

  // Header
  thead.innerHTML = `<tr>
    <th class="round-label">Round</th>
    ${state.players.map(p => `<th>${escHtml(p.name)}</th>`).join('')}
    <th>Balance Check</th>
    <th>Actions</th>
  </tr>`;

  // Compute running totals for footer
  const totals = {};
  state.players.forEach(p => { totals[p.id] = 0; });

  // Data rows
  tbody.innerHTML = state.rounds.map((round, idx) => {
    const isSpecial = round.type === 'special';
    const num = idx + 1;

    // Accumulate totals
    round.participants.forEach(part => {
      if (totals[part.playerId] !== undefined)
        totals[part.playerId] = r2(totals[part.playerId] + part.score);
    });

    // Round label
    let roundLabel = `<span class="main-label">Round ${num}</span>`;
    if (isSpecial) {
      const wName = state.players.find(p => p.id === round.winnerId)?.name ?? 'Unknown';
      roundLabel += `<br><span class="sub-label">Special Combo — ${escHtml(wName)}</span>`;
    } else if (round.pricePerCard !== 1) {
      roundLabel += `<br><span class="sub-label">$${round.pricePerCard}/card</span>`;
    }

    // Player cells
    const playerCells = state.players.map(player => {
      const part = round.participants.find(p => p.playerId === player.id);
      if (!part) return `<td class="inactive-cell">—</td>`;
      if (isSpecial) {
        const isWinner = player.id === round.winnerId;
        return `<td class="${isWinner ? 'winner-cell' : ''}">
          ${isWinner ? '<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Winner</div>' : ''}
          <div class="${moneyClass(part.score)}">${fmtMoney(part.score)}</div>
        </td>`;
      }
      return `<td>
        <div class="cards-line">${part.cards} card${part.cards !== 1 ? 's' : ''}</div>
        <div class="money-line ${moneyClass(part.score)}">${fmtMoney(part.score)}</div>
      </td>`;
    }).join('');

    // Balance check
    const sum = r2(round.participants.reduce((s, p) => s + p.score, 0));
    const balanceCell = Math.abs(sum) < 0.01
      ? `<td class="balance-ok">✓ Balanced</td>`
      : `<td class="balance-err">Error: ${fmtMoney(sum)}</td>`;

    // Actions
    const editBtn   = isSpecial ? '' : `<button class="btn btn-ghost btn-sm" onclick="openEditModal(${round.id})">Edit</button>`;
    const deleteBtn = `<button class="btn btn-danger btn-sm" onclick="deleteRound(${round.id})">Delete</button>`;

    return `<tr>
      <td class="round-label">${roundLabel}</td>
      ${playerCells}
      ${balanceCell}
      <td><div class="row-actions">${editBtn}${deleteBtn}</div></td>
    </tr>`;
  }).join('');

  // Totals footer row
  const totalCells = state.players.map(p => {
    const v = totals[p.id] ?? 0;
    return `<td class="${moneyClass(v)}" style="font-weight:600">${fmtMoney(v)}</td>`;
  }).join('');
  tbody.innerHTML += `<tr class="totals-row">
    <td class="round-label" style="text-align:left;font-weight:700">Total</td>
    ${totalCells}
    <td></td>
    <td></td>
  </tr>`;
}

function deleteRound(id) {
  if (!confirm('Delete this round?')) return;
  state.rounds = state.rounds.filter(r => r.id !== id);
  render();
}

// ════════════════════════════════════════════════════════════
// EDIT ROUND MODAL
// ════════════════════════════════════════════════════════════

let _editingRoundId = null;

function openEditModal(roundId) {
  const round = state.rounds.find(r => r.id === roundId);
  if (!round || round.type === 'special') return;
  _editingRoundId = roundId;

  document.getElementById('edit-price-input').value = round.pricePerCard;
  document.getElementById('edit-error').textContent = '';

  document.getElementById('edit-player-grid').innerHTML = state.players.map(p => {
    const part    = round.participants.find(pp => pp.playerId === p.id);
    const isActive= !!part;
    const cards   = part ? part.cards : 0;
    return `<div class="edit-player-row">
      <label>
        <input type="checkbox" id="edit-cb-${p.id}" ${isActive ? 'checked' : ''}>
        ${escHtml(p.name)}
      </label>
      <input type="number" id="edit-cards-${p.id}" value="${cards}" min="0" max="13" step="1" inputmode="numeric" pattern="[0-9]*">
    </div>`;
  }).join('');

  document.getElementById('edit-modal').showModal();
}

function closeEditModal() {
  _editingRoundId = null;
  document.getElementById('edit-modal').close();
}

function saveEdit() {
  const round = state.rounds.find(r => r.id === _editingRoundId);
  if (!round) return;

  const price  = parseFloat(document.getElementById('edit-price-input').value) || 1;
  const active = state.players
    .filter(p => document.getElementById(`edit-cb-${p.id}`)?.checked)
    .map(p => ({
      playerId: p.id,
      cards: parseInt(document.getElementById(`edit-cards-${p.id}`).value, 10) || 0
    }));

  if (active.length < 2 || active.length > 4) {
    document.getElementById('edit-error').textContent = 'Select 2–4 active players.';
    return;
  }
  for (const p of active) {
    if (!Number.isInteger(p.cards) || p.cards < 0 || p.cards > 13) {
      document.getElementById('edit-error').textContent = 'Card counts must be whole numbers between 0 and 13.';
      return;
    }
  }

  round.pricePerCard  = price;
  round.participants  = computeRoundScores(active, price);
  closeEditModal();
  render();
}

// ════════════════════════════════════════════════════════════
// SUMMARY
// ════════════════════════════════════════════════════════════

function computeTotals() {
  const totals = {};
  state.players.forEach(p => { totals[p.id] = 0; });
  state.rounds.forEach(round =>
    round.participants.forEach(part => {
      if (totals[part.playerId] !== undefined)
        totals[part.playerId] = r2(totals[part.playerId] + part.score);
    })
  );
  return totals;
}

function renderSummary() {
  const totals  = computeTotals();
  const entries = state.players.map(p => ({ player: p, total: totals[p.id] ?? 0 }));
  const total   = state.rounds.length;

  let winnerHtml = '<div class="stat-value" style="color:var(--muted)">—</div>';
  let loserHtml  = '<div class="stat-value" style="color:var(--muted)">—</div>';

  if (total > 0 && entries.length > 0) {
    const sorted = [...entries].sort((a, b) => b.total - a.total);
    const best   = sorted[0];
    const worst  = sorted[sorted.length - 1];
    winnerHtml = `<div class="stat-value pos">${escHtml(best.player.name)}<br><small>${fmtMoney(best.total)}</small></div>`;
    loserHtml  = `<div class="stat-value neg">${escHtml(worst.player.name)}<br><small>${fmtMoney(worst.total)}</small></div>`;
  }

  document.getElementById('summary-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Rounds</div>
      <div class="stat-value">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Biggest Winner</div>
      ${winnerHtml}
    </div>
    <div class="stat-card">
      <div class="stat-label">Biggest Loser</div>
      ${loserHtml}
    </div>
  `;
}

function resetGame() {
  if (!confirm('Reset game? All rounds will be cleared. Players will stay.')) return;
  state.rounds = [];
  _nextRoundId  = 1;
  render();
  sessionStorage.removeItem('big2-state');
}

// ════════════════════════════════════════════════════════════
// RENDER DISPATCHER
// ════════════════════════════════════════════════════════════

function render() {
  renderPlayerManagement();
  renderRoundEntry();
  renderResultsTable();
  renderSummary();
  saveState();
}

// ════════════════════════════════════════════════════════════
// SESSION STORAGE
// ════════════════════════════════════════════════════════════

function saveState() {
  try {
    sessionStorage.setItem('big2-state', JSON.stringify(state));
  } catch (e) {
    // sessionStorage unavailable (e.g. private browsing quota) — silently ignore
  }
}

function loadState() {
  try {
    const raw = sessionStorage.getItem('big2-state');
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved.players) || !Array.isArray(saved.rounds)) return null;
    state.players = saved.players;
    state.rounds  = saved.rounds;
    _nextPlayerId = (state.players.length ? Math.max(...state.players.map(p => p.id)) : 0) + 1;
    _nextRoundId  = (state.rounds.length  ? Math.max(...state.rounds.map(r => r.id))  : 0) + 1;
    return state;
  } catch (e) {
    return null;
  }
}

// ════════════════════════════════════════════════════════════
// MODAL: close on backdrop click
// ════════════════════════════════════════════════════════════

document.querySelectorAll('dialog').forEach(dlg => {
  dlg.addEventListener('click', e => { if (e.target === dlg) dlg.close(); });
});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════

loadState();
render();
</script>
</body>
</html>
